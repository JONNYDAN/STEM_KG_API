version: '3.8'

services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: stem_kg
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - stem_network

  mongodb:
    image: mongo:6
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - stem_network

  neo4j:
    image: neo4j:5
    environment:
      NEO4J_AUTH: neo4j/password
      NEO4J_PLUGINS: '["apoc"]'
    ports:
      - "7474:7474"  # HTTP
      - "7687:7687"  # Bolt
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    networks:
      - stem_network

  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: stem_kg
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      AUTH_POSTGRES_HOST: host.docker.internal
      AUTH_POSTGRES_PORT: 6432
      AUTH_POSTGRES_DB: etechs_global
      AUTH_POSTGRES_USER: postgres
      AUTH_POSTGRES_PASSWORD: postgres
      JWT_SECRET: dev-secret-key-change-me
      JWT_ALGORITHM: HS256
      JWT_USER_ID_CLAIM: user_id
      JWT_TENANT_ID_CLAIM: tenant_id
      JWT_TOKEN_TYPE_CLAIM: token_type
      JWT_REQUIRED_TOKEN_TYPE: access
      CORS_ALLOWED_ORIGINS: http://localhost:3039,https://ets.etechs.vn
      MONGO_HOST: mongodb
      MONGO_PORT: 27017
      MONGO_DB: stem_kg
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: password
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - postgres
      - mongodb
      - neo4j
    networks:
      - stem_network
    volumes:
      - ./app:/app

volumes:
  postgres_data:
  mongo_data:
  neo4j_data:
  neo4j_logs:

networks:
  stem_network:
    driver: bridge
